<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节日快乐</title>
  <style>
    :root {
      --pink-bg: #e7a094;
      --pink-deep: #9a5e58;
      --night-a: #041433;
      --night-b: #132a56;
      --night-c: #3f6ca8;
      --card: rgba(255, 255, 255, 0.18);
      --text-soft: #fff4f8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      background: #121212;
      color: #fff;
    }
    #app { width: 100%; height: 100%; position: relative; }
    .page {
      position: absolute;
      inset: 0;
      display: none;
      opacity: 0;
      transition: opacity 0.55s ease;
    }
    .page.active { display: flex; opacity: 1; }
    .center-wrap {
      width: min(92vw, 520px);
      margin: auto;
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 22px;
      padding: 24px 20px 22px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.32);
    }
    .title { margin: 0 0 10px; font-weight: 800; letter-spacing: 0.8px; line-height: 1.25; }
    .subtitle { margin: 6px 0; opacity: 0.95; line-height: 1.6; font-size: 15px; }
    .hint { margin-top: 10px; color: #ffdbe9; font-size: 13px; opacity: 0.92; }
    .btn {
      margin-top: 16px;
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      color: #fff;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(120deg, #ff6a98, #ff9f7d);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 92, 146, 0.33);
      transition: transform 0.2s ease, filter 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.04); }
    .hero-img {
      width: 138px;
      height: 138px;
      border-radius: 22px;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.26);
      margin: 4px 0 14px;
      background: #fff;
    }
    .password {
      width: min(280px, 90%);
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      margin-top: 8px;
      font-size: 16px;
      text-align: center;
      outline: none;
      color: #47333c;
    }
    .error {
      margin-top: 8px;
      min-height: 24px;
      color: #ffe3ec;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.28);
      font-size: 14px;
    }
    .countdown { margin-top: 14px; font-size: clamp(20px, 6vw, 34px); font-weight: 800; letter-spacing: 1.2px; }
    #gatePage, #loginPage {
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0) 32%),
        radial-gradient(circle at 86% 80%, rgba(255, 173, 202, 0.36) 0%, rgba(255, 173, 202, 0) 44%),
        linear-gradient(145deg, #f6a9bf, #ec8fb2 45%, #f3b4a5 100%);
    }
    #meteorPage {
      background: linear-gradient(180deg, var(--night-a) 0%, var(--night-b) 55%, var(--night-c) 100%);
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
    }
    #fireworksCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .fireworks-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 0;
      transform: translateZ(0);
      backface-visibility: hidden;
      will-change: transform;
      background: radial-gradient(circle at 50% 15%, #1a365d 0%, #0f1f3e 45%, #080d18 100%);
    }
    .fireworks-dim {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(180deg, rgba(7, 18, 38, 0.16) 0%, rgba(8, 20, 41, 0.12) 50%, rgba(10, 19, 35, 0.2) 100%);
      pointer-events: none;
    }
    .meteor-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 0;
      transform: translateZ(0);
      backface-visibility: hidden;
      will-change: transform;
      background: linear-gradient(180deg, var(--night-a) 0%, var(--night-b) 55%, var(--night-c) 100%);
    }
    .meteor-retouch {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 15%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 8% 30%, rgba(255, 255, 255, 0.22) 0 1px, transparent 2px),
        radial-gradient(circle at 26% 62%, rgba(255, 255, 255, 0.16) 0 1px, transparent 2px),
        radial-gradient(circle at 48% 22%, rgba(255, 255, 255, 0.14) 0 1px, transparent 2px),
        radial-gradient(circle at 67% 58%, rgba(255, 255, 255, 0.12) 0 1px, transparent 2px),
        radial-gradient(circle at 86% 34%, rgba(255, 255, 255, 0.18) 0 1px, transparent 2px),
        linear-gradient(180deg, rgba(10, 34, 78, 0.04) 0%, rgba(17, 48, 99, 0.18) 45%, rgba(22, 61, 118, 0.52) 100%);
    }
    .meteor-dim {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(180deg, rgba(3, 14, 38, 0.22) 0%, rgba(8, 21, 49, 0.18) 52%, rgba(12, 30, 68, 0.12) 100%);
      pointer-events: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px;
    }
    .overlay .inner { max-width: 720px; pointer-events: auto; }
    .glow-title { font-size: clamp(28px, 9vw, 54px); margin: 0; letter-spacing: 2px; text-shadow: 0 0 18px rgba(193, 222, 255, 0.62); }
    .meteor-title {
      font-family: "Arial Rounded MT Bold", "Hiragino Maru Gothic ProN", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #fff8fc;
      text-shadow:
        0 0 14px rgba(255, 204, 226, 0.9),
        0 0 28px rgba(255, 168, 205, 0.45),
        0 6px 18px rgba(19, 18, 48, 0.32);
    }
    .meteor-title-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(16px) scale(0.84);
      filter: blur(1px);
      will-change: transform, opacity, filter;
    }
    .meteor-title-char.is-visible {
      animation: meteorCharPop 12.4s cubic-bezier(0.22, 0.9, 0.24, 1) forwards;
    }
    .glow-sub.meteor-sub {
      opacity: 0;
      transform: translateY(10px);
      color: #fff1f7;
      text-shadow:
        0 0 12px rgba(255, 214, 231, 0.5),
        0 4px 10px rgba(12, 18, 39, 0.24);
    }
    .glow-sub.meteor-sub.is-visible {
      animation: meteorSubFade 14.4s ease forwards;
    }
    .glow-sub {
      font-size: clamp(14px, 3.8vw, 19px);
      opacity: 0.96;
      margin-top: 12px;
      line-height: 1.8;
      color: var(--text-soft);
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.35);
    }
    #fireworksPage {
      background: radial-gradient(circle at 50% 15%, #1a365d 0%, #0f1f3e 45%, #080d18 100%);
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
    }
    .fireworks-text {
      margin: 12px auto 0;
      max-width: min(92vw, 740px);
      line-height: 1.8;
      font-size: clamp(16px, 3.8vw, 27px);
      font-weight: 700;
      color: #ffeef5;
      text-shadow: 0 0 14px rgba(255, 151, 190, 0.56);
      min-height: 3em;
    }
    .music-note { margin-top: 12px; font-size: 13px; color: rgba(255, 255, 255, 0.9); }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes meteorCharPop {
      0% {
        opacity: 0;
        transform: translateY(16px) scale(0.84);
        filter: blur(1px);
      }
      72% {
        opacity: 1;
        transform: translateY(-2px) scale(1.04);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }
    @keyframes meteorSubFade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

        });
        if (state === STATES.LOGIN) {
          // 尝试自动播放，如果被浏览器拦截，首次点击也会触发
          tryStartMusic();
          initMusicOnFirstClick();
        }
      }

      function formatCountdown(ms) {
        const totalSec = Math.max(0, Math.floor(ms / 1000));
        const d = Math.floor(totalSec / 86400);
        const h = Math.floor((totalSec % 86400) / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        return [d, h, m, s].map((n) => String(n).padStart(2, "0")).join(" : ");
      }

      function stopGateTimer() {
        if (gateTimer) {
          clearInterval(gateTimer);
          gateTimer = null;
        }
      }

      function updateGate() {
        const now = Date.now();
        if (now >= unlockTs) {
          stopGateTimer();
          showState(STATES.LOGIN);
          return;
        }
        countdownEl.textContent = formatCountdown(unlockTs - now);
      }

      function startGateFlow() {
        if (CONFIG.PREVIEW_MODE) {
          showState(STATES.LOGIN);
          loginError.textContent = "预览模式：已临时关闭日期门禁和密码校验。";
          return;
        }
        if (Date.now() >= unlockTs) {
          showState(STATES.LOGIN);
          return;
        }
        showState(STATES.GATE);
        updateGate();
        gateTimer = setInterval(updateGate, 1000);
      }

      async function tryPlayMusic() {
        if (musicTried || !userInteracted) return;
        musicTried = true;
        try {
          bgMusic.volume = 0.5;
          await bgMusic.play();
          musicStatus.textContent = "🎵 XMASwu(吴骜) - 《7%》 ♪";
        } catch (_err) {
          musicStatus.textContent = "🎵 点击页面播放《7%》";
        }
      }

      function markInteractAndTryMusic() {
        if (!userInteracted) userInteracted = true;
        tryPlayMusic();
      }

      function canAdvance() {
        const now = Date.now();
        if (now - lastAdvanceTs < ADVANCE_COOLDOWN) return false;
        lastAdvanceTs = now;
        return true;
      }

      function prepareMeteorText() {
        if (!meteorTitle) return;
        const titleText = meteorTitle.dataset.text || meteorTitle.textContent || "";
        meteorTitle.innerHTML = "";
        Array.from(titleText).forEach((char, index) => {
          const span = document.createElement("span");
          span.className = "meteor-title-char";
          span.textContent = char;
          span.style.animationDelay = `${METEOR_TITLE_START_MS + index * METEOR_TITLE_STAGGER_MS}ms`;
          meteorTitle.appendChild(span);
        });
      }

      function playMeteorTextAnimation() {
        if (meteorTitle) {
          const chars = meteorTitle.querySelectorAll(".meteor-title-char");
          chars.forEach((char) => {
            char.classList.remove("is-visible");
            void char.offsetWidth;
            char.classList.add("is-visible");
          });
        }
        if (meteorSub) {
          meteorSub.classList.remove("is-visible");
          meteorSub.style.animationDelay = `${METEOR_SUB_DELAY_MS}ms`;
          void meteorSub.offsetWidth;
          meteorSub.classList.add("is-visible");
        }
      }

      function renderFireworksLines() {
        if (fireworksTextTimer) {
          clearInterval(fireworksTextTimer);
          fireworksTextTimer = null;
        }
        fireworksText.textContent = "";
        let idx = 0;
        const lines = CONFIG.FIREWORKS_LINES.slice();
        fireworksTextTimer = setInterval(() => {
          fireworksText.textContent = lines.slice(0, idx + 1).join("\n");
          fireworksText.style.whiteSpace = "pre-line";
          idx += 1;
          if (idx >= lines.length) {
            clearInterval(fireworksTextTimer);
            fireworksTextTimer = null;
          }
        }, 4600);
      }

      function prepareVideoForPlayback(video) {
        if (!video) return;
        video.preload = "auto";
        video.playsInline = true;
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "true");
      }

      function playVideoSafely(video, options = {}) {
        if (!video) return;
        const { restart = false } = options;
        prepareVideoForPlayback(video);
        if (restart && video.currentTime > 0.15) {
          video.currentTime = 0;
        }
        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      }

      function goToMeteor() {
        showState(STATES.METEOR);
        playMeteorTextAnimation();
        if (fireworksRenderer) fireworksRenderer.stop();
        if (meteorVideo) {
          meteorVideo.muted = true;
          meteorVideo.volume = 0;
          playVideoSafely(meteorVideo, { restart: true });
        }
      }

      function goToFireworks() {
        showState(STATES.FIREWORKS);
        if (fireworksVideo) {
          fireworksVideo.muted = true;
          fireworksVideo.volume = 0;
          playVideoSafely(fireworksVideo, { restart: true });
        }
        renderFireworksLines();
      }


      function advanceFrom(state) {
        tryStartMusic();
        if (!canAdvance()) return;
        if (state === STATES.METEOR && currentState === STATES.METEOR) goToFireworks();
        else if (state === STATES.FIREWORKS && currentState === STATES.FIREWORKS) goToMeteor();
      }

      enterBtn.addEventListener("click", () => {
        if (CONFIG.PREVIEW_MODE) {
          loginError.textContent = "";
          goToMeteor();
          return;
        }
        if (Date.now() < unlockTs) {
          loginError.textContent = "还没到开启时间哦。";
          showState(STATES.GATE);
          return;
        }
        const pwd = passwordInput.value.trim();
        if (pwd !== CONFIG.PASSWORD) {
          loginError.textContent = "密码不对，再试一次。";
          passwordInput.focus();
          return;
        }
        loginError.textContent = "";
        goToMeteor();
      });

      passwordInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") enterBtn.click();
      });

      meteorNextBtn.addEventListener("click", () => advanceFrom(STATES.METEOR));
      fireworksNextBtn.addEventListener("click", () => advanceFrom(STATES.FIREWORKS));

      let musicStarted = false;
      function tryStartMusic() {
        if (musicStarted) return;
        musicStarted = true;
        if (!userInteracted) userInteracted = true;
        tryPlayMusic();
      }
      // 用户首次点击页面任意处即启动音乐（兼容浏览器自动播放策略）
      function initMusicOnFirstClick() {
        const handler = () => {
          document.removeEventListener("pointerdown", handler);
          if (!userInteracted) userInteracted = true;
          musicTried = false;
          musicStarted = false;
          forcePlayMusic();
        };
        document.addEventListener("pointerdown", handler, { passive: true, once: true });
      }
      function forcePlayMusic() {
        tryStartMusic();
        if (bgMusic.paused) {
          bgMusic.volume = 0.5;
          bgMusic.play().then(() => {
            musicStatus.textContent = "🎵 XMASwu(吴骜) - 《7%》 ♪";
          }).catch(() => {});
        }
      }
      window.addEventListener("resize", () => {
        if (fireworksRenderer) fireworksRenderer.resize();
      });

      startGateFlow();

      function createMeteorRenderer(canvas) {
        const ctx = canvas.getContext("2d");
        let w = 0;
        let h = 0;
        let raf = null;
        let running = false;
        let stars = [];
        let meteors = [];
        let nextMeteorAt = 0;

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
          stars = Array.from({ length: Math.max(40, Math.floor((w * h) / 35000)) }, () => ({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.6 + 0.2,
            a: Math.random() * 0.8 + 0.2,
            tw: Math.random() * 0.02 + 0.003
          }));
        }

        function spawnMeteor() {
          const startX = Math.random() * (w * 0.85);
          const startY = Math.random() * (h * 0.28);
          const speed = Math.random() * 6 + 10;
          const angle = Math.PI / 4 + (Math.random() * 0.2 - 0.1);
          meteors.push({
            x: startX,
            y: startY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            len: Math.random() * 120 + 120,
            life: 1
          });
        }

        function drawBg() {
          const g = ctx.createLinearGradient(0, 0, 0, h);
          g.addColorStop(0, "#020b1f");
          g.addColorStop(0.55, "#11264d");
          g.addColorStop(1, "#3e6ea9");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, w, h);
        }

        function draw() {
          if (!running) return;
          drawBg();
          for (const s of stars) {
            s.a += (Math.random() > 0.5 ? 1 : -1) * s.tw;
            if (s.a > 1) s.a = 1;
            if (s.a < 0.15) s.a = 0.15;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${s.a})`;
            ctx.fill();
          }

          if (performance.now() >= nextMeteorAt) {
            spawnMeteor();
            nextMeteorAt = performance.now() + 800 + Math.random() * 1500;
          }

          meteors = meteors.filter((m) => m.life > 0);
          for (const m of meteors) {
            m.x += m.vx;
            m.y += m.vy;
            m.life -= 0.012;
            const tailX = m.x - (m.vx / 14) * m.len;
            const tailY = m.y - (m.vy / 14) * m.len;
            const lg = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
            lg.addColorStop(0, `rgba(255,255,255,${Math.max(0, m.life)})`);
            lg.addColorStop(0.3, `rgba(198,231,255,${Math.max(0, m.life * 0.9)})`);
            lg.addColorStop(1, "rgba(130,186,255,0)");
            ctx.strokeStyle = lg;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(m.x, m.y);
            ctx.lineTo(tailX, tailY);
            ctx.stroke();
          }
          raf = requestAnimationFrame(draw);
        }

        function start() {
          if (running) return;
          running = true;
          resize();
          nextMeteorAt = performance.now() + 120;
          draw();
        }

        function stop() {
          running = false;
          if (raf) cancelAnimationFrame(raf);
          raf = null;
        }
        return { start, stop, resize };
      }

      function createFireworksRenderer(canvas) {
        const ctx = canvas.getContext("2d");
        let w = 0;
        let h = 0;
        let raf = null;
        let running = false;
        let particles = [];
        let autoTimer = null;

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
        }

        function launch(x = Math.random() * w * 0.8 + w * 0.1, y = Math.random() * h * 0.45 + h * 0.12) {
          const count = 45 + Math.floor(Math.random() * 25);
          const hue = Math.floor(Math.random() * 360);
          for (let i = 0; i < count; i += 1) {
            const angle = (Math.PI * 2 * i) / count;
            const speed = Math.random() * 5 + 2.4;
            particles.push({
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              g: 0.05 + Math.random() * 0.05,
              life: 1,
              fade: 0.011 + Math.random() * 0.012,
              size: Math.random() * 2 + 1.2,
              color: `hsla(${hue + Math.random() * 30 - 15},95%,65%,`
            });
          }
        }

        function drawBg() {
          const g = ctx.createRadialGradient(w / 2, h * 0.15, 20, w / 2, h * 0.5, h);
          g.addColorStop(0, "#1c3f71");
          g.addColorStop(0.55, "#122645");
          g.addColorStop(1, "#070d18");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, w, h);
        }

        function draw() {
          if (!running) return;
          drawBg();
          particles = particles.filter((p) => p.life > 0);
          for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.992;
            p.vy += p.g;
            p.life -= p.fade;
            ctx.fillStyle = `${p.color}${Math.max(0, p.life)})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          }
          raf = requestAnimationFrame(draw);
        }

        function onPointer(e) {
          launch(e.clientX, e.clientY);
        }

        function start() {
          if (running) return;
          running = true;
          resize();
          launch();
          autoTimer = setInterval(() => launch(), 900);
          canvas.addEventListener("pointerdown", onPointer, { passive: true });
          draw();
        }

        function stop() {
          running = false;
          if (raf) cancelAnimationFrame(raf);
          raf = null;
          if (autoTimer) {
            clearInterval(autoTimer);
            autoTimer = null;
          }
          canvas.removeEventListener("pointerdown", onPointer);
        }
        return { start, stop, resize };
      }
    })();
  </script>
